server:
  port: 8081

#Values
jwt:
  secret: Qf8rXyP7vT3nWz9aL0kR2uM6sD1gJ5bH4yV8cE7pA0mN9qS2tU3wX6zF1hK8lC5
  expiration: 3600000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # Route to Auth Service
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**

        # Route to User Service
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
